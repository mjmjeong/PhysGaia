exp_name: demo_fit
mode: "physgaia"
use_gt_poses: False

camera_json_path: "PhysTrack/New/Pyro/pisa/camera_info_test.json"
camera_train_json_path: "PhysTrack/New/Pyro/pisa/camera_info_train_mono.json"
test_dir: "PhysTrack/New/Pyro/pisa/render/test"
train_dir: "PhysTrack/New/Pyro/pisa/render/train"
target_scene_id: 1

epi_th: 0.0001
ba_epi_th: 0.0003

dyn_id_cnt: 4
scf_geo_keyframe_rate: 1
dep_median: 1.0  
iso_focal: True
tap_loading_min_valid_cnt: 2

depth_boundary_th: 0.3

init_gt_camera: True
init_gt_camera_focal_only: False  
rescale_gt_cam_transl: True
ba_lr_cam_f: 0.0
