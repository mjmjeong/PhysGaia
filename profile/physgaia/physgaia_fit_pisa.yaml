geo_mosca_lambda_q_acc: 0.05

geo_mosca_resample_steps: 100

geo_mosca_steps: 4000
geo_mosca_lr_q: 0.01
geo_mosca_lr_p: 0.01

geo_mosca_viz_interval: -1
geo_mosca_viz_debug_interval: -1

# * GS init
gs_static_n_init: 80000
gs_dynamic_n_init: 30000
gs_radius_max: 0.05
gs_max_sph_order: 1
gs_radius_init_factor: 1.0

gs_max_node_num: 10000

# * Photo
photo_viz_interval: -1
photo_viz_cheap_interval: -1

gs_dynamic_start_opacity: 0.012
gs_static_start_opacity: 0.01
gs_include_fg_in_static: True

photo_total_steps: 8000
photo_skinning_corr_start_steps: 4501
photo_geo_reg_start_steps: 1000

photo_mlevel_list: [1, 3]
