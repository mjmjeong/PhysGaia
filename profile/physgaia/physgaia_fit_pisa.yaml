photo_s_ctrl_densify_max_grad: 0.0002
photo_s_ctrl_prune_opacity_th: 0.02
photo_s_ctrl_reset_opacity: 0.01

photo_s2d_trans_steps: []
photo_dyn_scf_prune_steps: [3500, 4500]
